<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>Sign in · Project Dashboard</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="login-body">
  <main class="login-wrap">
    <form id="login-form" class="login-card" autocomplete="on">
      <h1 class="login-title">Project Dashboard</h1>
      <p class="login-sub">Sign in to view your project's state.</p>

      <label class="login-label" for="password">Password</label>
      <input class="login-input" id="password" name="password" type="password"
             autocomplete="current-password" required autofocus
             aria-describedby="login-error" />

      <label class="login-remember">
        <input id="remember" type="checkbox" /> Remember me on this device
      </label>

      <button class="login-btn" type="submit" id="login-submit">Sign in</button>
      <p id="login-error" class="login-error" role="alert" aria-live="assertive"></p>
    </form>
    <p class="login-foot">Private dashboard · loopback of your GitHub project</p>
  </main>

  <script>
    const form = document.getElementById("login-form");
    const errEl = document.getElementById("login-error");
    const btn = document.getElementById("login-submit");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errEl.textContent = "";
      btn.disabled = true;
      btn.textContent = "Signing in…";
      try {
        const res = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            password: document.getElementById("password").value,
            remember: document.getElementById("remember").checked,
          }),
        });
        const data = await res.json().catch(() => ({}));
        if (res.ok && data.ok) {
          window.location.href = "/";
          return;
        }
        errEl.textContent = data.error || "Sign in failed.";
      } catch (_) {
        errEl.textContent = "Network error — try again.";
      } finally {
        btn.disabled = false;
        btn.textContent = "Sign in";
      }
    });
  </script>
</body>
</html>
